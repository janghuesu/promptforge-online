<!-- /imageintel.html — ImageIntel Pro Lab • v2.2 (Single-file, Always-On Analyzer, All Overlays) -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="color-scheme" content="dark"/>
<title>ImageIntel Pro Lab — v2.2</title>
<style>
  :root{--bg:#070a0f;--panel:#0c121b;--grid:rgba(255,255,255,.04);--text:#e6f1ff;--chip:#101826;--ok:#66ff99;--err:#ff4d6d}
  *{box-sizing:border-box} html,body{height:100%} body{margin:0;background:radial-gradient(1200px 900px at 10% -10%,#0d1826,var(--bg)) fixed;color:var(--text);font:14px/1.45 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:28px 28px;mask-image:radial-gradient(1000px 700px at 10% 0%,#000 76%,transparent)}
  .app{position:relative;z-index:1;height:100%;display:grid;gap:12px;padding:12px;grid-template-columns:1.25fr .75fr;grid-template-rows:62% 38%;grid-template-areas:"stage side" "kpi side"}
  .card{background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.006));border:1px solid rgba(255,255,255,.08);border-radius:18px;backdrop-filter:blur(6px)}
  .title{font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:11px;color:#99a9c4}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap} .col{display:grid;gap:8px}
  .chip{background:var(--chip);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 10px;font-size:12px;color:#b6cdfb}
  .chip.ok{border-color:rgba(102,255,153,.55);color:#d9ffe9}.chip.err{border-color:rgba(255,77,109,.6);color:#ffd7e0}
  .btn{background:linear-gradient(180deg,rgba(62,248,255,.16),rgba(62,248,255,.06));border:1px solid rgba(62,248,255,.55);color:#d7fdff;padding:8px 12px;border-radius:10px;cursor:pointer}
  .btn.secondary{border-color:rgba(102,255,153,.55);background:linear-gradient(180deg,rgba(102,255,153,.18),rgba(102,255,153,.07))}
  .btn.warn{border-color:rgba(255,209,102,.55);background:linear-gradient(180deg,rgba(255,209,102,.2),rgba(255,209,102,.08))}
  .btn.ghost{background:transparent;border:1px dashed rgba(255,255,255,.3)}
  .toggle{display:inline-flex;align-items:center;gap:6px;cursor:pointer}
  .toggle input{appearance:none;width:30px;height:18px;border-radius:999px;background:#15202f;border:1px solid rgba(255,255,255,.2);position:relative}
  .toggle input:checked{background:#113b3b;border-color:rgba(62,248,255,.5)}
  .toggle input::after{content:"";position:absolute;top:1px;left:1px;width:14px;height:14px;background:#9aa7bd;border-radius:50%;transition:160ms}
  .toggle input:checked::after{left:calc(100% - 15px);background:#72ffd5}
  #stage{grid-area:stage;display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}
  .stage-head{padding:10px;display:flex;align-items:center;justify-content:space-between}
  .canvas-wrap{position:relative;overflow:hidden;background:#0b0f14;border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);height:100%;min-height:360px}
  #view{position:absolute;left:0;top:0;width:100%;height:100%;display:block}
  .drop{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border:2px dashed rgba(255,255,255,.2);border-radius:12px;color:#9fb5d8;pointer-events:none;opacity:.18}
  #kpi{grid-area:kpi;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px;overflow:auto}
  .kpi{background:#0d121a;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px;min-height:118px;display:grid;grid-template-rows:auto 1fr}
  .list{display:grid;gap:6px;font-size:12px} .pill{padding:6px 8px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between}
  #swatch{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  #side{grid-area:side;display:grid;grid-template-rows:auto 1fr auto}
  #term{height:170px;overflow:auto;background:#05070b;border-top:1px solid rgba(255,255,255,.08);padding:8px;font:12px ui-monospace,Menlo,Consolas;color:#b0c3e6}
  .log.ok{color:#66ff99}.log.err{color:#ff7f97}
  textarea{width:100%;resize:vertical;background:#05070b;color:#e6f1ff;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px}
  .errbar{position:fixed;left:12px;right:12px;bottom:12px;background:#2a0f12;border:1px solid #ff4d6d;color:#ffdbe2;padding:10px;border-radius:12px;z-index:9999;display:none}
</style>
<style>
  #gt-wrap{position:fixed;top:8px;right:8px;z-index:9999;background:rgba(7,10,15,.88);border-radius:8px;padding:4px 8px}
  .goog-te-gadget{font-size:0!important}
  .goog-te-gadget select{font-size:12px!important;background:#0c121b;color:#e6f1ff;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:3px 6px;cursor:pointer}
  .goog-te-logo-link,.goog-te-gadget span{display:none!important}
</style>
</head>
<body>
<div id="gt-wrap"><div id="google_translate_element"></div></div>
<div class="app">
  <section id="stage" class="card">
    <div class="stage-head">
      <div class="row">
        <span class="title">BLACKSITE HUD</span>
        <span class="chip" id="ver">v2.2 — booting…</span>
        <span class="chip" id="fps">FPS — n/a</span>
      </div>
      <div class="row">
        <input id="file" type="file" accept="image/*" style="display:none"/>
        <label class="btn" for="file">Upload Image</label>
        <button id="btnRun" class="btn secondary">Run Analysis</button>
        <button id="btnOverlayTest" class="btn ghost">Overlay Test</button>
        <button id="btnMatrix" class="btn ghost">Matrix Test</button>
        <button id="btnReloadAI" class="btn warn">Reload Models</button>
      </div>
    </div>
    <div class="canvas-wrap" id="wrap">
      <canvas id="view"></canvas>
      <div class="drop" id="drop">Drop / Paste an image here</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;">
      <div class="row">
        <span class="chip" id="c-ui">UI — OK</span>
        <span class="chip" id="c-img">Image — …</span>
        <span class="chip" id="c-ai">AI — Loading…</span>
        <span class="chip" id="c-obj">Obj — …</span>
        <span class="chip" id="c-pose">Pose — …</span>
        <span class="chip" id="c-face">Face — …</span>
        <span class="chip" id="c-hands">Hands — …</span>
        <span class="chip" id="c-seg">Seg — …</span>
        <span class="chip" id="c-run">Detectors — …</span>
      </div>
      <div class="row">
        <button id="btnPNG" class="btn">PNG</button>
        <button id="btnJSON" class="btn">Report .json</button>
        <button id="btnNetTest" class="btn ghost">Network Test</button>
        <button id="btnCopyDiag" class="btn">Copy Diag</button>
      </div>
    </div>
  </section>

  <section id="kpi" class="card">
    <div class="kpi"><h4 class="title">Subject</h4><div class="list" id="k-subject"></div></div>
    <div class="kpi"><h4 class="title">Objects</h4><div class="list" id="k-objects"></div></div>
    <div class="kpi"><h4 class="title">Pose</h4><div class="list" id="k-pose"></div></div>
    <div class="kpi">
      <h4 class="title">Color / Lighting</h4>
      <div class="list" id="k-color"></div>
      <div id="swatch"></div>
    </div>
  </section>

  <aside id="side" class="card">
    <details open>
      <summary>Overlays & Controls</summary>
      <div class="row" style="padding:6px 8px;">
        <label class="toggle"><input id="tg-obj" type="checkbox" checked><span>Objects</span></label>
        <label class="toggle"><input id="tg-pose" type="checkbox" checked><span>Pose</span></label>
        <label class="toggle"><input id="tg-face" type="checkbox" checked><span>Face</span></label>
        <label class="toggle"><input id="tg-hands" type="checkbox" checked><span>Hands</span></label>
        <label class="toggle"><input id="tg-seg" type="checkbox"><span>Seg</span></label>
        <label class="toggle"><input id="tg-edges" type="checkbox" checked><span>Edges</span></label>
      </div>
      <div class="row" style="padding:0 8px 8px">
        <div class="col" style="min-width:160px"><label>Obj Opacity</label><input id="op-obj" type="range" min="0" max="100" value="90"/></div>
        <div class="col" style="min-width:160px"><label>Pose Opacity</label><input id="op-pose" type="range" min="0" max="100" value="90"/></div>
        <div class="col" style="min-width:160px"><label>Face Opacity</label><input id="op-face" type="range" min="0" max="100" value="90"/></div>
        <div class="col" style="min-width:160px"><label>Hands Opacity</label><input id="op-hands" type="range" min="0" max="100" value="90"/></div>
        <div class="col" style="min-width:160px"><label>Seg Opacity</label><input id="op-seg" type="range" min="0" max="100" value="60"/></div>
        <div class="col" style="min-width:160px"><label>Edges Opacity</label><input id="op-edges" type="range" min="0" max="100" value="25"/></div>
      </div>
    </details>

    <details open>
      <summary>Prompt Engine</summary>
      <div class="row" style="padding:6px 8px;">
        <div class="col" style="min-width:160px;"><label>Mode</label>
          <select id="pmode"><option value="sfw">SFW</option><option value="nsfw_safe">NSFW-safe (redacted)</option><option value="poetic">Poetic</option><option value="numeric">Numeric</option><option value="json">Raw JSON</option></select>
        </div>
        <div class="col" style="min-width:160px;"><label>Model Style</label>
          <select id="mstyle"><option value="generic">Generic</option><option value="sdxl">SDXL-like</option><option value="jugger">JuggernautXL-like</option></select>
        </div>
        <div class="col" style="min-width:160px;"><label>Style Pack</label>
          <select id="spack"><option value="neutral">Neutral</option><option value="tealorange">Cinematic Teal/Orange</option><option value="pastel">Soft Pastel</option><option value="mono">High-Contrast Mono</option><option value="vintage">Warm Vintage</option></select>
        </div>
        <div class="col" style="min-width:200px;"><label>Detail</label><input id="detail" type="range" min="0" max="100" value="85"/></div>
      </div>
      <div class="col" style="padding:0 8px 8px;">
        <div class="row" style="justify-content:space-between;width:100%"><span class="title">Prompt Output</span><span class="chip" id="pch">0 chars</span></div>
        <textarea id="prompt" rows="7" placeholder="Load an image and run analysis…"></textarea>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px">
          <div class="col"><label class="title">A</label><textarea id="pa" rows="5"></textarea></div>
          <div class="col"><label class="title">B</label><textarea id="pb" rows="5"></textarea></div>
          <div class="col"><label class="title">C</label><textarea id="pc" rows="5"></textarea></div>
        </div>
        <div class="row" style="margin-top:8px;">
          <button id="btnCopy" class="btn">Copy Prompt</button>
          <button id="btnTxt" class="btn">Download .txt</button>
          <button id="btnGenABC" class="btn">Generate A/B/C</button>
          <button id="btnCopyABC" class="btn">Copy All</button>
        </div>
      </div>
    </details>

    <details open>
      <summary>Diagnostics</summary>
      <pre id="diag" style="max-height:200px;overflow:auto;background:#03050a;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px;color:#cfe1ff"></pre>
      <div id="term"></div>
    </details>
  </aside>
</div>

<div class="errbar" id="errbar"></div>

<script>
/* ===== v2.2 Core (UI, Canvas, Offline features) ===== */
(function(){
  'use strict';
  const $=(id)=>document.getElementById(id);
  $('ver').textContent='v2.2 — JS OK ⬤';

  const wrap=$('wrap'), cv=$('view'), ctx=cv.getContext('2d',{willReadFrequently:true});
  const file=$('file'), term=$('term'), diag=$('diag'), fps=$('fps');
  const chips={img:$('c-img'), ai:$('c-ai'), run:$('c-run'), obj:$('c-obj'), pose:$('c-pose'), face:$('c-face'), hands:$('c-hands'), seg:$('c-seg')};
  const togg={obj:$('tg-obj'),pose:$('tg-pose'),face:$('tg-face'),hands:$('tg-hands'),seg:$('tg-seg'),edges:$('tg-edges')};
  const ops={obj:$('op-obj'),pose:$('op-pose'),face:$('op-face'),hands:$('op-hands'),seg:$('op-seg'),edges:$('op-edges')};
  const k={subject:$('k-subject'),objects:$('k-objects'),pose:$('k-pose'),color:$('k-color')};
  const swatchEl=$('swatch'), promptEl=$('prompt'), pch=$('pch');

  const STATE={ base:null, off:document.createElement('canvas'), hasImage:false, color:null, palette:[], dpr:Math.max(1,window.devicePixelRatio||1),
    AI:{ready:false, FilesetResolver:null, ObjectDetector:null, PoseLandmarker:null, FaceLandmarker:null, HandLandmarker:null, ImageSegmenter:null,
        fsr:null, detector:null, poser:null, facer:null, hander:null, segmenter:null, last:null } };

  function log(m,ok){const d=document.createElement('div');d.textContent=m;d.className='log'+(ok===true?' ok':ok===false?' err':'');term.appendChild(d);term.scrollTop=term.scrollHeight;}
  function banner(msg){const b=$('errbar');b.textContent=msg;b.style.display='block';setTimeout(()=>b.style.display='none',7000);}
  window.addEventListener('error',e=>{banner('JS: '+e.message);log('JS: '+e.message,false);});
  window.addEventListener('unhandledrejection',e=>{const m='Promise: '+(e.reason?.message||e.reason);banner(m);log(m,false);});

  // sizing (DPR sharp)
  function fit(){const r=wrap.getBoundingClientRect();const dpr=STATE.dpr=Math.max(1,window.devicePixelRatio||1);cv.style.width=r.width+'px';cv.style.height=r.height+'px';cv.width=Math.max(1,Math.floor(r.width*dpr));cv.height=Math.max(1,Math.floor(r.height*dpr));ctx.setTransform(dpr,0,0,dpr,0,0);if(STATE.base) redraw();}
  window.addEventListener('resize',fit); fit();

  // draw pipeline
  function redraw(){
    const base=STATE.base; const cssW=parseFloat(cv.style.width)||wrap.getBoundingClientRect().width; const cssH=parseFloat(cv.style.height)||wrap.getBoundingClientRect().height;
    ctx.clearRect(0,0,cssW,cssH); if(!base) return;
    const bw=base.width||base.naturalWidth, bh=base.height||base.naturalHeight, ia=bw/bh, ra=cssW/cssH;
    let w,h; if(ia>ra){w=cssW;h=w/ia;} else {h=cssH;w=h*ia;} const x=(cssW-w)/2, y=(cssH-h)/2;
    ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high'; ctx.drawImage(base,x,y,w,h);
    if(togg.edges.checked && (+ops.edges.value)>0) drawEdges(x,y,w,h,(+ops.edges.value)/100);
    if(STATE.AI.ready && STATE.AI.last){
      drawSeg(STATE.AI.last.seg,x,y,w,h);
      drawObjects(STATE.AI.last.obj,x,y,w,h);
      drawPose(STATE.AI.last.pose,x,y,w,h);
      drawHands(STATE.AI.last.hands,x,y,w,h);
      drawFace(STATE.AI.last.face,x,y,w,h);
    }
  }

  function drawEdges(x,y,w,h,alpha){
    const oc=STATE.off; oc.width=w|0; oc.height=h|0; const ox=oc.getContext('2d',{willReadFrequently:true}); ox.drawImage(STATE.base,0,0,w,h);
    const src=ox.getImageData(0,0,w,h); const out=ox.createImageData(w,h);
    const Gx=[-1,0,1,-2,0,2,-1,0,1], Gy=[-1,-2,-1,0,0,0,1,2,1];
    for(let yy=1;yy<h-1;yy++){ for(let xx=1;xx<w-1;xx++){
      let sx=0,sy=0,p=0; for(let ky=-1;ky<=1;ky++){ for(let kx=-1;kx<=1;kx++){
        const ix=((yy+ky)*w+(xx+kx))*4; const lum=0.2126*src.data[ix]+0.7152*src.data[ix+1]+0.0722*src.data[ix+2]; sx+=lum*Gx[p]; sy+=lum*Gy[p]; p++; } }
      const m=Math.min(255,Math.hypot(sx,sy)); const o=(yy*w+xx)*4; out.data[o]=out.data[o+1]=out.data[o+2]=m; out.data[o+3]=m>40?255:0;
    } }
    ox.putImageData(out,0,0); ctx.save(); ctx.globalAlpha=alpha; ctx.drawImage(oc,x,y,w,h); ctx.restore();
  }

  function colorStats(base){
    const w=base.width||base.naturalWidth,h=base.height||base.naturalHeight; const s=Math.max(1, Math.floor(Math.max(w,h)/180));
    const c=document.createElement('canvas'); c.width=Math.max(1,Math.floor(w/s)); c.height=Math.max(1,Math.floor(h/s)); const cx=c.getContext('2d'); cx.drawImage(base,0,0,c.width,c.height);
    const d=cx.getImageData(0,0,c.width,c.height).data; let lum=0,n=0; for(let i=0;i<d.length;i+=24){ lum+=(0.2126*d[i]+0.7152*d[i+1]+0.0722*d[i+2])/255; n++; }
    const L=+(lum/(n||1)).toFixed(3); return {avg_brightness:L, lighting:(L>0.7?'bright':(L<0.35?'dim':'moderate'))};
  }

  function kmeansPalette(base,k=5,iters=10){
    const W=180,H=180; const c=document.createElement('canvas'); c.width=W;c.height=H; const cx=c.getContext('2d');
    const bw=base.width||base.naturalWidth,bh=base.height||base.naturalHeight,ia=bw/bh,ra=W/H; let w,h; if(ia>ra){w=W;h=w/ia;}else{h=H;w=h*ia;} const x=(W-w)/2,y=(H-h)/2;
    cx.fillStyle='#000';cx.fillRect(0,0,W,H); cx.drawImage(base,x,y,w,h);
    const data=cx.getImageData(0,0,W,H).data; const pts=[]; for(let i=0;i<data.length;i+=16){ const a=data[i+3]; if(a<200) continue; pts.push([data[i],data[i+1],data[i+2]]); }
    if(!pts.length) return [];
    const C=[]; for(let i=0;i<k;i++) C.push(pts[(Math.random()*pts.length)|0].slice());
    const idx=new Array(pts.length).fill(0);
    for(let it=0;it<iters;it++){
      for(let pi=0;pi<pts.length;pi++){ let m=1e9,mi=0; for(let ci=0;ci<k;ci++){ const p=pts[pi],c=C[ci]; const d=(p[0]-c[0])**2+(p[1]-c[1])**2+(p[2]-c[2])**2; if(d<m){m=d;mi=ci;} } idx[pi]=mi; }
      const sum=Array.from({length:k},()=>[0,0,0,0]); for(let pi=0;pi<pts.length;pi++){ const c=sum[idx[pi]]; const p=pts[pi]; c[0]+=p[0];c[1]+=p[1];c[2]+=p[2];c[3]++; }
      for(let ci=0;ci<k;ci++){ if(sum[ci][3]>0) C[ci]=[sum[ci][0]/sum[ci][3],sum[ci][1]/sum[ci][3],sum[ci][2]/sum[ci][3]]; }
    }
    const count=new Array(k).fill(0); for(const i of idx) count[i]++; const total=pts.length;
    return C.map((c,i)=>({rgb:[c[0]|0,c[1]|0,c[2]|0], pct:+(count[i]/total*100).toFixed(1)})).sort((a,b)=>b.pct-a.pct);
  }
  function rgb2hex([r,g,b]){return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
  function renderPalette(pal){swatchEl.innerHTML='';STATE.palette=pal.map(p=>({hex:rgb2hex(p.rgb),pct:p.pct}));for(const p of STATE.palette){const chip=document.createElement('div');chip.style.width='26px';chip.style.height='18px';chip.style.borderRadius='6px';chip.style.border='1px solid rgba(255,255,255,.25)';chip.style.background=p.hex;chip.title=`${p.hex} • ${p.pct}%`;swatchEl.appendChild(chip);}}

  function makePrompt(det){
    const mode=$('pmode').value, style=$('mstyle').value, pack=$('spack').value, detail=+$('detail').value;
    const c=STATE.color||{lighting:'moderate'}, subj=det?.subject||'subject centered';
    const objList=(det?.objects||[]).slice(0,6).map(o=>o.name).join(', ');
    const pose=det?.poseAngle?`pose: shoulders ${det.poseAngle.shoulders.toFixed(1)}°, hips ${det.poseAngle.hips.toFixed(1)}°`:'';
    const camera=detail>=70?' [camera: 50mm, f/2.8, ISO 200, 1/250]':''; const packTxt=pack==='tealorange'?' cinematic teal & orange grade':pack==='pastel'?' soft pastel tones':pack==='mono'?' high-contrast monochrome':pack==='vintage'?' warm vintage film':'';
    const palTxt=(detail>=60 && STATE.palette.length)?` | palette: ${STATE.palette.slice(0,5).map(p=>p.hex).join(', ')}`:'';
    const core=`${style==='jugger'?'ultra-detailed, hyperreal, ':'photorealistic, '}${subj}, ${c.lighting} lighting${objList?`, objects: ${objList}`:''}${pose?`, ${pose}`:''}${camera}${packTxt}${palTxt}`;
    const negative='lowres, blur, watermark, duplicate';
    let out=core;
    if(mode==='poetic') out=`a vivid portrait, ${subj}; ${c.lighting} light wraps edges; ${objList||'minimal clutter'}${palTxt}`;
    if(mode==='numeric') out=`detail:${detail} | luminance:${(STATE.color?.avg_brightness??0).toFixed(2)} | objs:${(det?.objects?.length||0)} | pal:${STATE.palette.slice(0,5).map(p=>p.hex).join('/')}`;
    if(mode==='json') out=JSON.stringify({style,pack,detail,subject:subj,lighting:c.lighting,objects:det?.objects||[],pose:det?.poseAngle||null,palette:STATE.palette.slice(0,5)},null,2);
    if(mode==='nsfw_safe') out=out.replace(/\b(nude|naked|breast|nipples?|vagina|penis|butt|ass)\b/gi,'[redacted]');
    return out+(mode==='json'?'':`\nNEGATIVE: ${negative}`);
  }
  function renderPrompt(det){const t=makePrompt(det);promptEl.value=t;pch.textContent=t.length+' chars';}

  // image loading
  async function decodeBitmap(file){try{const bmp=await createImageBitmap(file);log('Decode: createImageBitmap ✓',true);return bmp;}catch(e){log('Bitmap path failed: '+(e.message||e),false);return null;}}
  function decodeReader(file){return new Promise((res,rej)=>{const fr=new FileReader();fr.onerror=()=>rej(fr.error);fr.onload=()=>{const im=new Image();im.decoding='async';im.onload=()=>res(im);im.onerror=()=>rej(new Error('dataURL decode failed'));im.src=fr.result;};fr.readAsDataURL(file);}).then(img=>{log('Decode: FileReader(dataURL) ✓',true);return img;}).catch(e=>{log('Reader path failed: '+(e.message||e),false);return null;});}
  async function loadFile(file){
    if(!file){log('Picker returned no file',false);return;}
    log(`Picked file: "${file.name}" type=${file.type||'?'} size=${file.size}B`,true);
    if(!/^image\//i.test(file.type||'')){chips.img.classList.add('err');chips.img.textContent='Image — ERR (MIME)';return;}
    let base=null;
    try{const url=URL.createObjectURL(file);base=await new Promise((res,rej)=>{const im=new Image();im.decoding='async';im.onload=()=>res(im);im.onerror=()=>rej(new Error('blob-url decode failed'));im.src=url;});URL.revokeObjectURL(url);log('Decode: blob-url ✓',true);}catch(e){log('Blob-url path failed: '+(e.message||e),false);}
    if(!base) base=await decodeBitmap(file) || await decodeReader(file);
    if(!base){chips.img.classList.add('err');chips.img.textContent='Image — ERR (decode)';return;}
    STATE.base=base; STATE.hasImage=true; chips.img.classList.remove('err'); chips.img.classList.add('ok'); chips.img.textContent='Image — OK';
    STATE.color=colorStats(base); renderPalette(kmeansPalette(base,5,10));
    k.color.innerHTML=`<div class="pill"><span>Brightness</span><span>${STATE.color.avg_brightness}</span></div><div class="pill"><span>Lighting</span><span>${STATE.color.lighting}</span></div>`;
    redraw(); renderPrompt(STATE.AI.last?.promptDet||{subject:'subject centered'}); log('Image loaded ✓',true);
    // auto-run when AI is ready
    if(STATE.AI.ready) analyzeAI(); else analyzeOffline();
  }

  wrap.addEventListener('dragover',e=>{e.preventDefault();$('drop').style.opacity='.36';});
  wrap.addEventListener('dragleave',e=>{e.preventDefault();$('drop').style.opacity='.18';});
  wrap.addEventListener('drop',e=>{e.preventDefault();$('drop').style.opacity='.18';const f=e.dataTransfer?.files?.[0];if(f)loadFile(f);else log('Drop had no files',false);});
  window.addEventListener('paste',e=>{const it=(e.clipboardData&&e.clipboardData.items)||[];for(const x of it){if(x.type.indexOf('image/')===0){const f=x.getAsFile();if(f){log('Paste: got image',true);loadFile(f);}return;}}log('Paste: no image item',false);});
  document.querySelector('label[for="file"]').addEventListener('click',()=>log('Picker opened…',true));
  file.addEventListener('change',e=>{const f=e.target.files?.[0];if(f)loadFile(f);else log('Picker canceled',false);});

  // buttons
  $('btnOverlayTest').addEventListener('click',()=>{const cssW=parseFloat(cv.style.width)||wrap.getBoundingClientRect().width;const cssH=parseFloat(cv.style.height)||wrap.getBoundingClientRect().height;ctx.clearRect(0,0,cssW,cssH);ctx.strokeStyle='#9ad1ff';ctx.shadowColor='#9ad1ff';ctx.shadowBlur=8;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(cssW,cssH);ctx.moveTo(cssW,0);ctx.lineTo(0,cssH);ctx.stroke();ctx.font='16px ui-sans-serif';ctx.fillStyle='#9ad1ff';ctx.fillText('OVERLAY OK',12,22);log('Overlay test ✓',true);});
  $('btnMatrix').addEventListener('click',()=>{const w=640,h=896;const c=document.createElement('canvas');c.width=w;c.height=h;const g=c.getContext('2d');g.fillStyle='#0b0f14';g.fillRect(0,0,w,h);g.strokeStyle='rgba(255,255,255,.12)';for(let x=0;x<w;x+=32){g.beginPath();g.moveTo(x,0);g.lineTo(x,h);g.stroke();}for(let y=0;y<h;y+=32){g.beginPath();g.moveTo(0,y);g.lineTo(w,y);g.stroke();}g.fillStyle='#8fd1ff';g.font='20px ui-sans-serif';g.fillText('MATRIX TEST',20,36);const im=new Image();im.onload=()=>{STATE.base=im;STATE.hasImage=true;chips.img.classList.add('ok');chips.img.textContent='Image — OK';STATE.color=colorStats(im);renderPalette(kmeansPalette(im,5,10));k.color.innerHTML=`<div class="pill"><span>Brightness</span><span>${STATE.color.avg_brightness}</span></div><div class="pill"><span>Lighting</span><span>${STATE.color.lighting}</span></div>`;redraw();renderPrompt({subject:'subject centered'});log('Matrix test image injected ✓',true);if(STATE.AI.ready) analyzeAI();};im.src=c.toDataURL('image/png');});
  $('btnPNG').addEventListener('click',()=>{try{const a=document.createElement('a');a.download='overlays.png';a.href=cv.toDataURL('image/png');a.click();log('Export PNG ✓',true);}catch(e){log('Export PNG failed: '+e.message,false);}});
  $('btnJSON').addEventListener('click',()=>{const payload={version:'v2.2',color:STATE.color,palette:STATE.palette,ai:!!STATE.AI.ready,det:(STATE.AI.last?{objects:STATE.AI.last.objects?.length||0}:null),prompt:promptEl.value,time:new Date().toISOString(),env:{ua:navigator.userAgent,dpr:STATE.dpr}};const a=document.createElement('a');a.download='report.json';a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(payload,null,2));a.click();});
  $('btnCopyDiag').addEventListener('click',async()=>{try{await navigator.clipboard.writeText((diag.textContent||'')+'\n\n'+(term.textContent||''));log('Diag copied ✓',true);}catch(e){log('Copy failed',false);}});
  $('btnGenABC').addEventListener('click',()=>{const det=(STATE.AI.last&&STATE.AI.last.promptDet)||{subject:'subject centered'};const v1=makePrompt(det),v2=makePrompt({...det,subject:'rule-of-thirds, subject left'}),v3=makePrompt({...det,subject:'tight head-and-shoulders crop'});$('pa').value=v1;$('pb').value=v2;$('pc').value=v3;});
  $('btnCopy').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(promptEl.value);log('Prompt copied ✓',true);}catch(e){log('Copy failed',false);}});
  $('btnTxt').addEventListener('click',()=>{const a=document.createElement('a');a.download='prompt.txt';a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(promptEl.value);a.click();});
  $('btnReloadAI').addEventListener('click',initAI);
  $('btnNetTest').addEventListener('click',async()=>{const urls=[CDN+'/vision_bundle.mjs',CDN+'/wasm/wasm-wasm-simd.wasm',GCS.obj,GCS.pose,GCS.face,GCS.hands,GCS.seg];const out=[];for(const u of urls){const t0=performance.now();try{const r=await fetch(u,{mode:'cors'});out.push(`${r.ok?'OK':'ERR'} ${(performance.now()-t0).toFixed(0)}ms  ${u}`);}catch(e){out.push(`ERR  ${(performance.now()-t0).toFixed(0)}ms  ${u}  (${e.message||e})`);}}diag.textContent+='\\n\\n[Network Test]\\n'+out.join('\\n');});

  // offline analysis
  function analyzeOffline(){
    if(!STATE.hasImage){log('Run: no image yet',false);return;}
    const det={subject:'subject centered',objects:[],poseAngle:null};
    k.subject.innerHTML=`<div class="pill"><span>Framing</span><span>${det.subject}</span></div>`;
    k.objects.innerHTML='<div class="pill"><span>—</span><span>n/a</span></div>';
    k.pose.innerHTML='<div class="pill"><span>—</span><span>n/a</span></div>';
    redraw(); renderPrompt(det); chips.run.classList.add('ok'); chips.run.textContent='Detectors — Offline OK'; log('Analysis (offline) ✓',true);
  }
  document.getElementById('btnRun').addEventListener('click',()=>{ if(STATE.AI.ready) analyzeAI(); else analyzeOffline(); });

  // boot diag
  (function bootDiag(){
    const feats=[['Canvas',!!cv.getContext],['DPR',window.devicePixelRatio||1],['ImageBitmap','createImageBitmap' in window],['FileReader','FileReader' in window]];
    diag.textContent=['Version: v2.2','URL: '+location.href,'UA: '+navigator.userAgent,'Lang: '+navigator.language,'Platform: '+navigator.platform,'Cores: '+(navigator.hardwareConcurrency||'?'),'MemoryGB: '+(navigator.deviceMemory||'?'),'Features: '+feats.map(([k,v])=>k+'='+v).join(', ')].join('\\n');
  })();

  (function tick(){fps.textContent='FPS — '+(1000/16.7).toFixed(1);requestAnimationFrame(tick);})();

  // ===== AI (Mediapipe) loader & analyzers =====
  const CDN='https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.21';
  const GCS={
    obj:'https://storage.googleapis.com/mediapipe-tasks/object_detector/efficientdet_lite0_uint8.tflite',
    pose:'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
    face:'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
    hands:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
    seg:'https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/1/selfie_segmenter.tflite'
  };

  async function initAI(){
    chips.ai.textContent='AI — Loading…'; chips.ai.classList.remove('ok','err');
    try{
      const mod = await import(CDN+'/vision_bundle.mjs');
      const {FilesetResolver,ObjectDetector,PoseLandmarker,FaceLandmarker,HandLandmarker,ImageSegmenter} = mod;
      STATE.AI.FilesetResolver=FilesetResolver; STATE.AI.ObjectDetector=ObjectDetector; STATE.AI.PoseLandmarker=PoseLandmarker; STATE.AI.FaceLandmarker=FaceLandmarker; STATE.AI.HandLandmarker=HandLandmarker; STATE.AI.ImageSegmenter=ImageSegmenter;
      const fsr = await FilesetResolver.forVisionTasks(CDN+'/wasm'); STATE.AI.fsr=fsr;

      STATE.AI.detector = await ObjectDetector.createFromOptions(fsr,{ baseOptions:{ modelAssetPath:GCS.obj, delegate:'CPU' }, runningMode:'IMAGE', scoreThreshold:0.5, maxResults:12 });
      chips.obj.classList.add('ok'); chips.obj.textContent='Obj — OK';

      STATE.AI.poser = await PoseLandmarker.createFromOptions(fsr,{ baseOptions:{ modelAssetPath:GCS.pose, delegate:'CPU' }, runningMode:'IMAGE', numPoses:1 });
      chips.pose.classList.add('ok'); chips.pose.textContent='Pose — OK';

      STATE.AI.facer = await FaceLandmarker.createFromOptions(fsr,{ baseOptions:{ modelAssetPath:GCS.face, delegate:'CPU' }, runningMode:'IMAGE', numFaces:1, outputFacialTransformationMatrixes:true });
      chips.face.classList.add('ok'); chips.face.textContent='Face — OK';

      try{
        STATE.AI.hander = await HandLandmarker.createFromOptions(fsr,{ baseOptions:{ modelAssetPath:GCS.hands, delegate:'CPU' }, runningMode:'IMAGE', numHands:2 });
        chips.hands.classList.add('ok'); chips.hands.textContent='Hands — OK';
      }catch(e){ chips.hands.classList.add('err'); chips.hands.textContent='Hands — ERR'; log('Hands model failed: '+(e.message||e),false); }

      try{
        STATE.AI.segmenter = await ImageSegmenter.createFromOptions(fsr,{ baseOptions:{ modelAssetPath:GCS.seg, delegate:'CPU' }, runningMode:'IMAGE', outputCategoryMask:true });
        chips.seg.classList.add('ok'); chips.seg.textContent='Seg — OK';
      }catch(e){ chips.seg.classList.add('err'); chips.seg.textContent='Seg — ERR'; log('Seg model failed: '+(e.message||e),false); }

      STATE.AI.ready=true; chips.ai.classList.add('ok'); chips.ai.textContent='AI — Ready';
      log('Mediapipe ready ✓',true);
      if(STATE.hasImage) analyzeAI();
    }catch(e){
      STATE.AI.ready=false; chips.ai.classList.add('err'); chips.ai.textContent='AI — ERR'; chips.obj.textContent='Obj — …'; chips.pose.textContent='Pose — …'; chips.face.textContent='Face — …'; chips.hands.textContent='Hands — …'; chips.seg.textContent='Seg — …';
      log('AI init failed: '+(e.message||e),false);
    }
  }
  initAI();

  function toCanvasImage(){
    const cssW=parseFloat(cv.style.width)||wrap.getBoundingClientRect().width; const cssH=parseFloat(cv.style.height)||wrap.getBoundingClientRect().height;
    const tmp=document.createElement('canvas'); tmp.width=cssW; tmp.height=cssH; const t=tmp.getContext('2d');
    const bw=STATE.base.width||STATE.base.naturalWidth, bh=STATE.base.height||STATE.base.naturalHeight, ia=bw/bh, ra=cssW/cssH;
    let w,h; if(ia>ra){w=cssW;h=w/ia;} else {h=cssH;w=h*ia;} const x=(cssW-w)/2, y=(cssH-h)/2; t.drawImage(STATE.base,x,y,w,h);
    return tmp;
  }
  const angle=(a,b)=>Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI;

  async function analyzeAI(){
    if(!STATE.hasImage || !STATE.AI.ready){ analyzeOffline(); return; }
    chips.run.textContent='Detectors — Running…'; chips.run.classList.remove('ok','err'); log('Run ▶ AI');
    try{
      const imgEl=toCanvasImage();
      const [obj,pose,face] = await Promise.all([
        STATE.AI.detector.detect(imgEl),
        STATE.AI.poser.detect(imgEl),
        STATE.AI.facer.detect(imgEl)
      ]);
      let hands=null, seg=null;
      try{ if(STATE.AI.hander) hands = await STATE.AI.hander.detect(imgEl); }catch(e){ log('Hands detect failed: '+(e.message||e),false); }
      try{ if(STATE.AI.segmenter && togg.seg.checked) seg = await STATE.AI.segmenter.segment(imgEl); }catch(e){ log('Seg detect failed: '+(e.message||e),false); }

      const detObjects=(obj?.detections||[]).map(d=>({name:d.categories?.[0]?.categoryName||'object',score:d.categories?.[0]?.score||0}));
      k.objects.innerHTML = detObjects.length ? detObjects.slice(0,10).map(o=>`<div class="pill"><span>${o.name}</span><span>${Math.round(o.score*100)}%</span></div>`).join('') : '<div class="pill"><span>—</span><span>n/a</span></div>';

      let shoulders=0, hips=0, subject='frontal/3⁄4'; const l=pose?.landmarks?.[0];
      if(l){ if(l[11]&&l[12]) shoulders=angle(l[11],l[12]); if(l[23]&&l[24]) hips=angle(l[23],l[24]); subject = Math.abs(shoulders)>25 ? 'profile-ish' : 'frontal/3⁄4'; }
      k.subject.innerHTML=`<div class="pill"><span>Framing</span><span>${subject}</span></div>`;
      k.pose.innerHTML= l? `<div class="pill"><span>Shoulders</span><span>${shoulders.toFixed(1)}°</span></div><div class="pill"><span>Hips</span><span>${hips.toFixed(1)}°</span></div>` : '<div class="pill"><span>—</span><span>n/a</span></div>';

      STATE.AI.last={obj,pose,face,hands,seg, objects:detObjects, poseAngle:l?{shoulders,hips}:null, promptDet:{subject,objects:detObjects,poseAngle:l?{shoulders,hips}:null}};
      redraw(); renderPrompt(STATE.AI.last.promptDet);
      chips.run.classList.add('ok'); chips.run.textContent='Detectors — Done'; log('Analysis complete ✓',true);
    }catch(e){
      chips.run.classList.add('err'); chips.run.textContent='Detectors — ERR'; log('AI run error: '+(e.message||e),false); analyzeOffline();
    }
  }

  // overlay painters
  function drawObjects(res,x,y,w,h){ if(!togg.obj.checked || !res?.detections?.length) return;
    ctx.save(); ctx.globalAlpha=(+ops.obj.value||90)/100; ctx.lineWidth=2.2; ctx.font='12px ui-sans-serif';
    for(const d of res.detections){ const bb=d.boundingBox; const bx=x+bb.originX, by=y+bb.originY, bw=bb.width, bh=bb.height; // bb already in drawn coords (MP canvas input)
      ctx.strokeStyle='rgba(62,248,255,.95)'; ctx.strokeRect(bx,by,bw,bh);
      const name=d.categories?.[0]?.categoryName||'object', sc=Math.round((d.categories?.[0]?.score||0)*100);
      const lab=`${name} ${sc}%`; const tw=ctx.measureText(lab).width+10, th=18;
      ctx.fillStyle='rgba(15,27,38,.92)'; ctx.fillRect(bx,Math.max(0,by-th),tw,th);
      ctx.strokeStyle='rgba(62,248,255,.45)'; ctx.strokeRect(bx,Math.max(0,by-th),tw,th);
      ctx.fillStyle='#c7faff'; ctx.fillText(lab,bx+6,Math.max(0,by-th)+13);
    } ctx.restore();
  }
  function drawPose(res,x,y,w,h){ if(!togg.pose.checked || !res?.landmarks?.length) return;
    const l=res.landmarks[0]; ctx.save(); ctx.globalAlpha=(+ops.pose.value||90)/100; ctx.lineWidth=3; ctx.strokeStyle='rgba(102,255,153,.9)';
    const E=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24]]; for(const [a,b] of E){ const pa=l[a],pb=l[b]; if(!pa||!pb) continue; ctx.beginPath(); ctx.moveTo(x+pa.x*w,y+pa.y*h); ctx.lineTo(x+pb.x*w,y+pb.y*h); ctx.stroke(); } ctx.restore();
  }
  function drawFace(res,x,y,w,h){ if(!togg.face.checked || !res?.faceLandmarks?.length) return;
    ctx.save(); ctx.globalAlpha=(+ops.face.value||90)/100; ctx.fillStyle='rgba(255,220,140,.9)'; for(const l of res.faceLandmarks){ for(const p of l){ ctx.beginPath(); ctx.arc(x+p.x*w,y+p.y*h,1.6,0,6.283); ctx.fill(); } } ctx.restore();
  }
  function drawHands(res,x,y,w,h){ if(!togg.hands.checked || !res?.landmarks?.length) return;
    ctx.save(); ctx.globalAlpha=(+ops.hands.value||90)/100; ctx.lineWidth=2.5; ctx.strokeStyle='rgba(255,180,120,.9)';
    const C=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
    for(const hand of res.landmarks){ for(const [a,b] of C){ const pa=hand[a],pb=hand[b]; if(!pa||!pb) continue; ctx.beginPath(); ctx.moveTo(x+pa.x*w,y+pa.y*h); ctx.lineTo(x+pb.x*w,y+pb.y*h); ctx.stroke(); } }
    ctx.restore();
  }
  function drawSeg(res,x,y,w,h){ if(!togg.seg.checked || !res?.categoryMask) return;
    const mask=res.categoryMask; const oc=document.createElement('canvas'); oc.width=mask.width; oc.height=mask.height;
    const ox=oc.getContext('2d'); const imgData=ox.createImageData(mask.width,mask.height); const data=imgData.data; const buf=mask.getAsFloat32Array();
    const aMax=(+ops.seg.value||60)*2.55|0; for(let i=0;i<buf.length;i++){ const a=buf[i]>0.5?aMax:0; data[i*4+0]=80; data[i*4+1]=200; data[i*4+2]=255; data[i*4+3]=a; } ox.putImageData(imgData,0,0); ctx.drawImage(oc,x,y,w,h);
  }

})();
</script>
